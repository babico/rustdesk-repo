name: Update RustDesk APT Repository

on:
  schedule:
    # Check for new releases every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if no new version'
        required: false
        default: 'false'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      current_version: ${{ steps.check.outputs.current_version }}
      should_update: ${{ steps.check.outputs.should_update }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new RustDesk release
        id: check
        run: |
          # Get latest release tag from GitHub API
          LATEST=$(curl -sSf "https://api.github.com/repos/rustdesk/rustdesk/releases/latest" \
            -H "Accept: application/vnd.github+json" \
            | jq -r '.tag_name')

          echo "Latest upstream version: $LATEST"
          echo "new_version=$LATEST" >> "$GITHUB_OUTPUT"

          # Read currently tracked version (if any)
          if [ -f "tracked_version.txt" ]; then
            CURRENT=$(cat tracked_version.txt)
          else
            CURRENT=""
          fi

          echo "Current tracked version: $CURRENT"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"

          if [ "$LATEST" != "$CURRENT" ] || [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
            echo "should_update=true" >> "$GITHUB_OUTPUT"
            echo "Update needed: $CURRENT -> $LATEST"
          else
            echo "should_update=false" >> "$GITHUB_OUTPUT"
            echo "No update needed."
          fi

  build-apt-repo:
    needs: check-and-update
    if: needs.check-and-update.outputs.should_update == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check-and-update.outputs.new_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev gnupg apt-utils curl jq

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --passphrase "$GPG_PASSPHRASE" --import
            echo "GPG_SIGNING=true" >> "$GITHUB_ENV"
            GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep '^sec' | awk '{print $2}' | cut -d'/' -f2 | head -1)
            echo "GPG_KEY_ID=$GPG_KEY_ID" >> "$GITHUB_ENV"
            echo "GPG key imported: $GPG_KEY_ID"
          else
            echo "GPG_SIGNING=false" >> "$GITHUB_ENV"
            echo "WARNING: No GPG key configured. Repo will be unsigned."
          fi

      - name: Download RustDesk .deb packages
        run: |
          bash scripts/download-debs.sh "$VERSION"

      - name: Build APT repository structure
        run: |
          bash scripts/build-repo.sh "$VERSION" "$GPG_KEY_ID" "${{ secrets.GPG_PASSPHRASE }}"

      - name: Update tracked version
        run: echo "$VERSION" > tracked_version.txt

      - name: Generate repository landing page
        run: |
          bash scripts/generate-index.sh "$VERSION"

      - name: Commit and push repo changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update RustDesk APT repo to $VERSION" || echo "Nothing to commit"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy-pages:
    needs: build-apt-repo
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4